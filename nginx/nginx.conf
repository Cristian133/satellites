proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=30m use_temp_path=off;

upstream backend {
  server backend:3000;
}

server {
  listen 80;

  # ─── Static FE assets ────────────────────────────────────────────────────────
  root /usr/share/nginx/html;
  index index.html;

  # Angular build hashes assets — cache aggressively
  location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ─── API proxy ────────────────────────────────────────────────────────────────

  # Starlink census doesn't change between TLE syncs — cache 10 min
  location = /api/starlink/census {
    proxy_pass         http://backend;
    proxy_cache        api_cache;
    proxy_cache_valid  200 10m;
    proxy_cache_key    "$request_uri";
    add_header         X-Cache-Status $upstream_cache_status;
  }

  # All other API calls — no cache, pass through
  location /api/ {
    proxy_pass         http://backend;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # ─── SPA routing — fallback to index.html ────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }
}
