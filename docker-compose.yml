services:
  backend:
    image: ghcr.io/cristian133/satellites-be:latest
    build:
      context: ./satellites-be
      dockerfile: Dockerfile
    expose:
      - "3000"
    volumes:
      - satellites_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SYNC_ON_START=true
      - SYNC_SCHEDULE=0 */6 * * *
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: ghcr.io/cristian133/satellites-nginx:latest
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backup:
    profiles: ["backup"]
    image: alpine:3.21
    volumes:
      - satellites_data:/data:ro
      - ./scripts/backup-sqlite.sh:/backup.sh:ro
    environment:
      - DB_PATH=/data/satellites.db
      - BACKUP_REMOTE=${BACKUP_REMOTE}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
    # Installs sqlite and rclone on first run, then schedules daily backup at 02:00
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache sqlite rclone && \
        echo "0 2 * * * /backup.sh >> /var/log/backup.log 2>&1" | crontab - && \
        crond -f -d 8

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    expose:
      - "9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  satellites_data:
  prometheus_data:
  grafana_data:
  traefik_certs:
