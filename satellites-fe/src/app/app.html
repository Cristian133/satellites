<div class="app-container">

  <!-- Sleek Top Header Navigation Bar (Glassmorphic) -->
  <header class="app-header">
    <div class="app-header__logo">
      <span class="app-header__icon">🪐</span>
      <span class="app-header__logo-text">ORBITAL SYSTEMS</span>
    </div>

    <nav class="app-header__nav" aria-label="Navegación principal">
      <a class="nav-btn" routerLink="/tracker" routerLinkActive="nav-btn--active"
        [routerLinkActiveOptions]="{ exact: true }" role="tab">
        🛰️ Rastreador Real-Time
      </a>
      <a class="nav-btn" routerLink="/kessler" routerLinkActive="nav-btn--active" role="tab">
        💥 Simulador Kessler
      </a>
      <a class="nav-btn" routerLink="/census" routerLinkActive="nav-btn--active" role="tab">
        📊 Censo Starlink
      </a>
    </nav>
  </header>

  <!-- Content area -->
  <main class="app-main">
    <router-outlet />
  </main>
</div>
