<div class="radar-container">
  
  <!-- Radar SVG Planisphere -->
  <div class="radar-chart">
    <svg viewBox="0 0 300 300" width="100%" height="100%" aria-label="Mapa celeste interactivo del pase de satélite">
      
      <!-- Definitions for glow effects and gradients -->
      <defs>
        <radialGradient id="skyGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#0a122c" />
          <stop offset="70%" stop-color="#050a18" />
          <stop offset="100%" stop-color="#02040b" />
        </radialGradient>
        
        <filter id="blueGlow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="3" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <filter id="yellowGlow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="4" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
      </defs>

      <!-- Background sky circle -->
      <circle cx="150" cy="150" r="120" fill="url(#skyGrad)" stroke="#1e293b" stroke-width="1.5" />

      <!-- Concentric Grid lines for Elevations -->
      <!-- 30° Elevation (Radius 80) -->
      <circle cx="150" cy="150" r="80" fill="none" stroke="rgba(56, 189, 248, 0.12)" stroke-dasharray="4 4" stroke-width="1" />
      <text x="152" y="76" class="grid-label">30°</text>

      <!-- 60° Elevation (Radius 40) -->
      <circle cx="150" cy="150" r="40" fill="none" stroke="rgba(56, 189, 248, 0.12)" stroke-dasharray="4 4" stroke-width="1" />
      <text x="152" y="116" class="grid-label">60°</text>

      <!-- Crosshair Radial Lines for Azimuths -->
      <!-- Vertical N-S line -->
      <line x1="150" y1="30" x2="150" y2="270" stroke="rgba(56, 189, 248, 0.08)" stroke-width="1" />
      <!-- Horizontal E-W line -->
      <line x1="30" y1="150" x2="270" y2="150" stroke="rgba(56, 189, 248, 0.08)" stroke-width="1" />
      
      <!-- 45° Diagonal lines -->
      <line x1="65.1" y1="65.1" x2="234.9" y2="234.9" stroke="rgba(56, 189, 248, 0.05)" stroke-width="1" />
      <line x1="65.1" y1="234.9" x2="234.9" y2="65.1" stroke="rgba(56, 189, 248, 0.05)" stroke-width="1" />

      <!-- Zenith Center Mark -->
      <circle cx="150" cy="150" r="2.5" fill="#38bdf8" opacity="0.6" />

      <!-- Cardinal Labels -->
      <text x="150" y="24" class="cardinal-label text-center">E</text>
      <text x="278" y="154" class="cardinal-label text-right">S</text>
      <text x="150" y="286" class="cardinal-label text-center">O</text>
      <text x="22" y="154" class="cardinal-label text-left">N</text>

      <!-- Satellite Orbit Track line -->
      @if (trackPath()) {
        <path [attr.d]="trackPath()" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-dasharray="5 3" filter="url(#blueGlow)" opacity="0.75" />
      }

      <!-- Celestial Bodies Plotting (Sol, Luna, Planetas) -->
      @for (body of activeCelestialBodies(); track body.name) {
        @let c = getCoords(body.az_deg, body.el_deg);
        <g class="celestial-body">
          <circle [attr.cx]="c.x" [attr.cy]="c.y" r="8" fill="rgba(30, 41, 59, 0.75)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1" />
          <text [attr.x]="c.x" [attr.y]="c.y + 3" class="celestial-emoji">{{ body.icon }}</text>
          <text [attr.x]="c.x" [attr.y]="c.y - 11" class="celestial-name">{{ body.name }}</text>
        </g>
      }

      <!-- Track Annotations / Markers -->
      @if (pathMarks(); as marks) {
        <!-- Start point -->
        <g class="track-mark">
          <circle [attr.cx]="marks.rise.x" [attr.cy]="marks.rise.y" r="4.5" fill="#f97316" stroke="#050a18" stroke-width="1.5" />
          <text [attr.x]="marks.rise.x" [attr.y]="marks.rise.y - 8" class="mark-label">
            Inicio {{ marks.rise.time | date:'HH:mm':'UTC' }}
          </text>
        </g>

        <!-- Peak point -->
        <g class="track-mark text-peak">
          <circle [attr.cx]="marks.peak.x" [attr.cy]="marks.peak.y" r="5" fill="#fbbf24" stroke="#050a18" stroke-width="1.5" />
          <text [attr.x]="marks.peak.x" [attr.y]="marks.peak.y - 8" class="mark-label mark-label--peak">
            Máx {{ marks.peak.time | date:'HH:mm':'UTC' }}
          </text>
        </g>

        <!-- End point -->
        <g class="track-mark">
          <circle [attr.cx]="marks.set.x" [attr.cy]="marks.set.y" r="4.5" fill="#ef4444" stroke="#050a18" stroke-width="1.5" />
          <text [attr.x]="marks.set.x" [attr.y]="marks.set.y - 8" class="mark-label">
            Fin {{ marks.set.time | date:'HH:mm':'UTC' }}
          </text>
        </g>
      }

      <!-- Yellow Pointer Arrow indicating selected / current time -->
      @if (pointerCoords()) {
        <!-- Line from center to current point -->
        <line x1="150" y1="150" [attr.x2]="pointerCoords()!.x" [attr.y2]="pointerCoords()!.y" 
              stroke="#fbbf24" stroke-width="2.5" filter="url(#yellowGlow)" opacity="0.85" />
        
        <!-- Rotating pointer arrowhead pointing outwards -->
        @if (arrowheadPoints()) {
          <polygon [attr.points]="arrowheadPoints()" fill="#fbbf24" filter="url(#yellowGlow)" />
        }
      }

    </svg>
  </div>

  <!-- Scrubbing playback timeline slider -->
  @if (track().length > 0) {
    <div class="playback-panel">
      <div class="slider-row">
        <input 
          type="range" 
          min="0" 
          [max]="track().length - 1" 
          [ngModel]="currentIndex()"
          (ngModelChange)="currentIndex.set($event)"
          class="time-slider"
          aria-label="Línea de tiempo del pase"
        />
      </div>
      
      <!-- Time indicator -->
      @if (currentPoint(); as pt) {
        <div class="slider-time">
          <span>🕒 Hora: {{ pt.time | date:'HH:mm:ss':'UTC' }} UTC</span>
        </div>
      }
    </div>
  }

  <!-- Bottom Coordinates Stats (Matching ISS Detector: Dirección inicial, Elevación inicial) -->
  @if (currentPoint(); as pt) {
    <div class="radar-stats">
      <div class="stat-col">
        <span class="stat-label">Dirección actual</span>
        <span class="stat-value">{{ azToCardinal(pt.az_deg) }} ({{ pt.az_deg | number:'1.0-0' }}°)</span>
      </div>
      <div class="stat-col align-right">
        <span class="stat-label">Elevación actual</span>
        <span class="stat-value">{{ pt.el_deg | number:'1.1-1' }}°</span>
      </div>
    </div>
  }

</div>
